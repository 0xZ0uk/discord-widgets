name: weather
description: "Weather widget showing current conditions for a location"
category: "utility"
component: "weather"
color: "#3498db"
fields:
  - name: "Location"
    prop: "location"
    value: "Porto, Portugal"
    inline: true
  - name: "Temperature"
    prop: "temp"
    value: "22°"
    inline: true
  - name: "Condition"
    prop: "condition"
    value: "Partly Cloudy"
buttons:
  - label: "Detailed Forecast"
    style: "primary"
    action:
      type: "url"
      url: "https://weather.com"
